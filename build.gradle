buildscript {
    repositories {
        mavenCentral()
    }
}

plugins {
    id "org.jetbrains.intellij" version "0.3.0"
}

apply plugin: 'idea'
apply plugin: 'org.jetbrains.intellij'
apply plugin: 'java'

intellij {
    version '173.2099.4' //IntelliJ IDEA 2016.3 dependency; for a full list of IntelliJ IDEA releases please see https://www.jetbrains.com/intellij-repository/releases
//    version 'IC-2016.3' //IntelliJ IDEA 2016.3 dependency; for a full list of IntelliJ IDEA releases please see https://www.jetbrains.com/intellij-repository/releases
    plugins 'coverage' //Bundled plugin dependencies
    pluginName 'Gradle Switches and Properties'
}

group 'org.jetbrains'
version '0.0.6' // Plugin version

sourceSets {
    main {
        java {
            srcDirs = ["src"]
        }
        resources {
            srcDir 'src'
            include '**/*.xml'
            include 'META-INF/**'
        }
    }
}